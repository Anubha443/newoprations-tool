events {}
http {
  server { listen 80; server_name _; location /.well-known/acme-challenge/ { root /var/www/certbot; } location / { return 301 https://$host$request_uri; } }
  server {
    listen 443 ssl;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example/privkey.pem;
    location / { proxy_pass http://web:3000; }
    location /api/ { proxy_pass http://api-gateway:4000/; }
  }
}
